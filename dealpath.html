<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Deal Path</title>
  <style>
    :root{
      /* Modern, clean UI sans stack (Salesforce-ish without relying on SF Sans being installed) */
      --font: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";

      --active-bg: #17345b;
      --active-fg: #ffffff;

      --done-bg: #a6e7db;
      --done-fg: #0d3a33;

      --todo-bg: #e6e6e6;
      --todo-fg: #4f4f4f;

      /* Deal Path sizing */
      --track-h: 37px;
      --cut: 15px;
      --radius: 16px;
      --overlap: 12px;
      --divider: 2px;

      /* Embed padding */
      --embed-pad-top: 0px;
      --embed-pad-bottom: 6px;
      --embed-pad-x: 8px;

      /* Highlights */
      --hl-label: #667085;
      --hl-value: #111827;

      /* Salesforce-ish Lead tile color */
      --sf-lead-blue: #0176d3;

      /* Header (⬆️ +0.5pt-ish) */
      --hl-title-size: 22.2px;
      --hl-title-weight: 750;

      /* Metrics (⬆️ +0.5pt-ish) */
      --hl-label-size: 12.7px;
      --hl-value-size: 15.7px;
      --hl-value-weight: 650;
      --hl-label-weight: 650;

      /* Indicators */
      --ok: #1f7a3a;
      --warn: #ca8a04;
      --alert: #dc2626;
      --stall-hl-bg: rgba(220,38,38,0.10);
      --stall-hl-ring: rgba(220,38,38,0.18);

      /* Toast */
      --toast-bg: #bff3ea;
      --toast-fg: #0d3a33;
      --toast-shadow: 0 8px 30px rgba(0,0,0,0.10);
      --toast-radius: 8px;
    }

    html,body{
      width:100%;
      max-width:100%;
      overflow-x:hidden;
      min-height: 120px;
    }

    body{
      margin:0;
      background: transparent;
      font-family: var(--font);
      padding: var(--embed-pad-top) var(--embed-pad-x) var(--embed-pad-bottom);
      box-sizing: border-box;
      color: #111;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .frame{
      width:100%;
      display:flex;
      align-items:flex-start;
      justify-content:center;
    }

    .root{
      width: 100%;
      max-width: 100%;
      min-width: 0;
      display:flex;
      flex-direction: column;
    }

    /* ===== Header / Highlights (FIXED) ===== */
    .highlights{
      width: 100%;
      padding: 4px 0 0 0;
      box-sizing:border-box;
      /* slightly tighter bottom spacing, so the bar sits a touch closer */
      margin-bottom: 6px;
    }

    /* One clean single-line record header: [icon] [title] */
    .hlTop{
      display:flex;
      align-items:center;        /* true vertical centering */
      gap: 8px;                 /* consistent spacing */
      min-width:0;
    }

    /* Salesforce-like icon tile */
    .hlIconTile{
      width: 43px;
      height: 43px;
      border-radius: 6px;
      background: transparent;
      display:grid;
      place-items:center;
      flex: 0 0 auto;
      box-shadow: none;
    }

    .hlIconTile img{
      width: 43px;
      height: 43px;
      display:block;
      object-fit: contain;
    }

    .hlTitle{
      font-size: var(--hl-title-size);
      font-weight: var(--hl-title-weight);
      color: #0f172a;
      line-height: 1.2;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      min-width:0;
    }

    /* Metrics row: clean grid + consistent gap (no dividers) */
    .hlMetrics{
      margin-top: 6px;
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      padding: 0;
      background: transparent;
    }

    .metric{
      padding: 0;
      min-width:0;
      position:relative;
    }

    .mLabel{
      font-size: var(--hl-label-size);
      font-weight: var(--hl-label-weight);
      color: var(--hl-label);
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      line-height: 1.1;
    }

    .mValue{
      margin-top: 4px;
      font-size: var(--hl-value-size);
      font-weight: var(--hl-value-weight);
      letter-spacing: 0;
      color: var(--hl-value);
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
      display:flex;
      align-items:center;
      gap: 6px;
      min-width:0;
    }

    /* Stalled Reason: subtle highlight + red circled ! */
    .stallHL{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 2px 6px;
      border-radius: 6px;
      background: var(--stall-hl-bg);
      box-shadow: inset 0 0 0 1px var(--stall-hl-ring);
      max-width: 100%;
    }
    .alertIcon{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }
    .alertIcon svg{ width: 16px; height: 16px; display:block; }

    /* Follow-up indicator icon container */
    .dueIcon{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }
    .dueIcon svg{ width: 16px; height: 16px; display:block; }

    @media (max-width: 860px){
      .hlMetrics{ grid-template-columns: 1fr 1fr; }
    }

    /* ===== Deal Path bar (unchanged) ===== */
    .bar{
      width: 100%;
      display:flex;
      align-items:center;
      gap: 10px;
      min-width: 0;
      margin-top: 6px;
    }

    .disclosure{
      width: 30px;
      height: 30px;
      border-radius: 15px;
      border: 1px solid rgba(0,0,0,0.10);
      background: #ffffff;
      display:grid;
      place-items:center;
      cursor:pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      transition: transform 160ms ease, box-shadow 160ms ease;
      flex: 0 0 auto;
    }
    .disclosure:hover{
      box-shadow: 0 6px 16px rgba(0,0,0,0.10);
      transform: translateY(-1px);
    }
    .disclosure:active{ transform: translateY(0px); }
    .disclosure svg{ transition: transform 180ms ease; }
    .disclosure[aria-expanded="true"] svg{ transform: rotate(180deg); }

    .deal-path{
      flex: 1 1 auto;
      display:flex;
      height: var(--track-h);
      user-select:none;
      overflow:hidden;
      border-radius: var(--radius);
      background: transparent;
      min-width: 0;
    }

    .stage{
      position:relative;
      flex: 1 1 0;
      min-width: 0;
      display:flex;
      align-items:center;
      justify-content:center;

      font-size: 12.5px;
      font-weight: 600;
      letter-spacing: .2px;

      cursor:pointer;
      outline: none;
      border: 0;
      padding: 0 8px;
      background: var(--todo-bg);
      color: var(--todo-fg);

      clip-path: polygon(
        0 0,
        calc(100% - var(--cut)) 0,
        100% 50%,
        calc(100% - var(--cut)) 100%,
        0 100%,
        var(--cut) 50%
      );

      margin-left: calc(var(--overlap) * -1);
      transition: transform 160ms ease, filter 160ms ease;
    }

    .stage:hover{ filter: brightness(0.99); }
    .stage:active{ transform: translateY(1px); }

    .stage:first-child{
      clip-path: polygon(
        0 0,
        calc(100% - var(--cut)) 0,
        100% 50%,
        calc(100% - var(--cut)) 100%,
        0 100%
      );
      margin-left: 0;
      justify-content:center;
      padding-left: 8px;
    }

    .stage:last-child{
      clip-path: polygon(
        0 0,
        100% 0,
        100% 100%,
        0 100%,
        var(--cut) 50%
      );
    }

    .stage:not(:last-child)::after{
      content:"";
      position:absolute;
      top:0;
      right:0;
      width: var(--divider);
      height:100%;
      background: rgba(255,255,255,0.92);
      pointer-events:none;
    }

    .stage[data-state="active"]{ background: var(--active-bg); color: var(--active-fg); font-weight: 650; }
    .stage[data-state="todo"]{ background: var(--todo-bg); color: var(--todo-fg); }
    .deal-path .stage[data-state="done"]{
      background: var(--done-bg) !important;
      color: var(--done-fg) !important;
    }

    /* ===== Off-ramp state (Nurture / Lost / Dead) ===== */
    /* The whole path desaturates to signal "not in active pursuit", while the
       chevron still shows how far the file advanced. A badge names the exit. */
    .deal-path.path-offramp .stage{
      filter: grayscale(0.7) opacity(0.6);
      transition: filter 200ms ease;
    }
    .offramp-badge{
      position:absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 6;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .3px;
      text-transform: uppercase;
      white-space: nowrap;
      filter: none !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      pointer-events: none;
    }
    /* lift the badged stage back to full strength so the badge reads clearly */
    .deal-path.path-offramp .stage:has(.offramp-badge){
      filter: grayscale(0.25) opacity(0.92);
    }
    .offramp-warn{  background: #fef3c7; color: #92400e; box-shadow: inset 0 0 0 1px #fcd34d, 0 2px 8px rgba(0,0,0,.15); }
    .offramp-alert{ background: #fee2e2; color: #991b1b; box-shadow: inset 0 0 0 1px #fca5a5, 0 2px 8px rgba(0,0,0,.15); }
    .offramp-muted{ background: #e5e7eb; color: #374151; box-shadow: inset 0 0 0 1px #cbd5e1, 0 2px 8px rgba(0,0,0,.15); }

    .label{
      display:flex;
      align-items:center;
      gap: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      min-width: 0;
    }

    .stage[data-state="active"] .stage[data-state="done"] .text{
      display:inline-block;
      overflow:hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      min-width: 0;
    }

    .stage[data-state="done"] .text{ display:none; }
    .stage[data-state="done"] .label{ gap: 0; justify-content:center; }

    .tip{
      position:absolute;
      left: 50%;
      bottom: calc(100% + 8px);
      transform: translateX(-50%) translateY(6px);
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 650;
      background: rgba(17,17,17,0.92);
      color: #fff;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18);
      transition: opacity 140ms ease, transform 140ms ease;
      z-index: 5;
    }
    .stage:hover .tip{
      opacity: 1;
      transform: translateX(-50%) translateY(0px);
    }

    /* ─── CTA button ─── */
    .cta{
      height: 30px;
      padding: 0 14px;
      border-radius: 16px;
      border: 0;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .1px;
      color: #fff;
      background: #1447c0;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: none;
      white-space: nowrap;
      flex: 0 0 auto;
      transition: background 160ms ease, transform 140ms ease, box-shadow 140ms ease;
      position: relative;
      overflow: hidden;
    }
    .cta:hover{
      background: #123fae;
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(0,0,0,0.18);
    }
    .cta:active{
      background: #0f389d;
      transform: translateY(0px);
      box-shadow: none;
    }
    .cta.cta-done{
      background: #16a34a;
      cursor: default;
      opacity: 0.95;
    }
    .cta.cta-done:hover{
      background: #16a34a;
      transform: none;
      box-shadow: none;
    }

    @media (max-width: 760px){
      .bar{flex-wrap:wrap;}
      .cta{margin-left:auto;}
    }

    /* Guidance */
    .guidance{
      margin-top: 6px;
      padding-left: 36px;
      box-sizing: border-box;
    }

    .guidanceWrap{
      display:grid;
      grid-template-rows: 1fr;
      transition: grid-template-rows 220ms ease;
    }
    .guidanceWrap.collapsed{
      grid-template-rows: 0fr;
    }
    .guidanceWrap > .guidanceInner{
      overflow:hidden;
      min-height:0;
    }

    .guidanceBody{
      padding: 6px 0 0 0;
      color: #333;
      font-size: 12px;
      line-height: 1.35;
    }
    .guidanceBody h4{
      margin: 0 0 6px 0;
      font-size: 12px;
      font-weight: 600;
      color: #111827;
    }
    .guidanceBody ul{
      margin: 6px 0 0 16px;
      padding: 0;
    }
    .guidanceBody li{
      margin: 4px 0;
      color: #4a4a4a;
      font-weight: 550;
    }

    /* Toast */
    .toast{
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      opacity: 0;
      pointer-events:none;
      background: var(--toast-bg);
      color: var(--toast-fg);
      border-radius: var(--toast-radius);
      box-shadow: var(--toast-shadow);
      padding: 8px 12px;
      display:flex;
      align-items:center;
      gap: 8px;
      min-width: 320px;
      max-width: min(520px, calc(100vw - 24px));
      z-index: 99999;
      transition: opacity 200ms ease, transform 200ms ease;
    }
    .toast.show{
      opacity: 1;
      transform: translateX(-50%) translateY(0px);
      pointer-events:auto;
    }
    .toast .msg{
      font-weight: 700;
      font-size: 13px;
      flex:1;
    }
    .toast .x{
      border:0;
      background: transparent;
      cursor:pointer;
      width: 26px;
      height: 26px;
      display:grid;
      place-items:center;
      border-radius: 7px;
      transition: background 120ms ease;
    }
    .toast .x:hover{ background: rgba(0,0,0,0.06); }
  
    .hlLoading{
      margin-left:auto;
      display:flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      color:#64748b;
      white-space:nowrap;
    }
    .spinner{
      width:12px;
      height:12px;
      border:2px solid rgba(100,116,139,.35);
      border-top-color: rgba(100,116,139,1);
      border-radius:0;
      animation: spin .8s linear infinite;
      flex:0 0 auto;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ===== Full-screen loading overlay + blur (perceived speed) ===== */
    body{ position: relative; }
    .loading-blur{
      filter: blur(3px);
      opacity: 0.92;
      pointer-events: none;
      transition: filter 180ms ease, opacity 180ms ease;
    }
    .loadingOverlay{
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.88);
      z-index: 100000;
    }
    .loadingCard{
  display:flex;
  flex-direction: column;
  align-items:center;
  gap: 8px;
  padding: 0;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
  min-width: 0;
  max-width: 360px;
}
.loadingSpinner{
  width: 29px;
  height: 29px;
  border: 4px solid rgba(1,118,211,0.18);
  border-top-color: rgba(1,118,211,1);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  flex:0 0 auto;
}
.loadingTitle{
  font-size:24px;
  font-weight: 800;
  color: var(--text);
}
.loadingSub{
  font-size: 12px;
  color: var(--muted);
}

    .loadingTitle{
      font-weight: 800;
      font-size:24px;
      color: #0f172a;
    }
    .loadingSub{
      font-weight: 650;
      font-size: 12.5px;
      color: #64748b;
    }

    /* Badges */
    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1px;
      line-height: 1.2;
      white-space: nowrap;
    }
    .badge.overdue{
      background: rgba(220,38,38,0.12);
      color: var(--alert);
      box-shadow: inset 0 0 0 1px rgba(220,38,38,0.18);
    }
    .badge.upcoming{
  background: rgba(16,185,129,0.18);
  color: rgba(6,95,70,1);
  box-shadow: inset 0 0 0 1px rgba(16,185,129,0.28);
}


  

/* --- Animations + hover tooltips --- */
.stage{
  transition: background-color .22s ease, border-color .22s ease, box-shadow .22s ease, transform .18s ease;
}
.stage[data-state="active"]{ animation: stagePop .42s cubic-bezier(0.34, 1.56, 0.64, 1); }
.stage[data-state="done"]{ animation: stageDoneIn .20s ease; }
@keyframes stagePop{
  0%   { transform: scale(0.96); }
  45%  { transform: scale(1.05); }
  70%  { transform: scale(0.99); }
  100% { transform: scale(1); }
}

/* Pulsing emphasis ring on the newly selected active stage */
.stage[data-state="active"]::before{
  content:"";
  position:absolute;
  inset:0;
  clip-path: inherit;
  box-shadow: 0 0 0 0 rgba(23,52,91,0.45);
  pointer-events:none;
  animation: activePulse .55s ease-out;
}
@keyframes activePulse{
  0%   { box-shadow: 0 0 0 0 rgba(23,52,91,0.50); }
  100% { box-shadow: 0 0 0 10px rgba(23,52,91,0); }
}

/* Press feedback during the click delay */
.stage-pressed{ animation: stagePress .5s ease !important; }
@keyframes stagePress{
  0%   { transform: scale(1); filter: brightness(1); }
  50%  { transform: scale(0.96); filter: brightness(0.94); }
  100% { transform: scale(0.97); filter: brightness(0.96); }
}
@keyframes stageDoneIn{ from{ transform: scale(0.99); opacity: .92;} to{ transform: scale(1); opacity: 1;} }
@keyframes chkIn{ from{ transform: scale(0.7); opacity: 0;} 

/* --- Completed stage checkmark (no box) --- */
.chk{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-right:8px;
  flex: 0 0 auto;
  background: transparent !important;
  box-shadow: none !important;
  border: none !important;
  width: auto !important;
  height: auto !important;
  border-radius: 0 !important;
}
.chk svg{
  width:16px;
  height:16px;
  display:block;
  animation: chkIn .18s ease;
}

to{ transform: scale(1); opacity: 1;} }

/* --- Completed checkmark style (match reference) --- */
.stage[data-state="active"] .chk,
.stage[data-state="todo"] 
    /* ===== CLOSED CELEBRATION ===== */
    @keyframes closedFlash{
      0%   { background: var(--active-bg); }
      18%  { background: #16a34a; }
      55%  { background: #15803d; }
      100% { background: var(--done-bg); }
    }
    .stage-closed-flash{
      animation: closedFlash 1.0s cubic-bezier(0.22,1,0.36,1) forwards !important;
    }

    /* Completion pour — each stage pops up boldly in turn, left → right,
       building emphasis as the wave crosses the whole path */
    .stage-fill{
      animation: fillPop .46s cubic-bezier(0.34,1.7,0.5,1) both !important;
      animation-delay: var(--fill-delay, 0ms);
      z-index: 2;
    }
    @keyframes fillPop{
      0%   { transform: translateY(0)    scale(1);    }
      35%  { transform: translateY(-9px) scale(1.12); }
      62%  { transform: translateY(2px)  scale(0.97); }
      82%  { transform: translateY(-1px) scale(1.02); }
      100% { transform: translateY(0)    scale(1);    }
    }
    /* bright sheen sweep + outward ring pulse as each stage pops */
    .stage-fill::after{ display:none; }
    .stage-fill::before{
      content:"";
      position:absolute;
      inset:0;
      clip-path: inherit;
      background: linear-gradient(100deg,
        rgba(255,255,255,0) 30%,
        rgba(255,255,255,0.95) 50%,
        rgba(255,255,255,0) 70%);
      background-size: 220% 100%;
      background-position: 160% 0;
      opacity: 0;
      pointer-events:none;
      z-index: 1;
      animation: fillSheen .46s ease-out both;
      animation-delay: var(--fill-delay, 0ms);
    }
    @keyframes fillSheen{
      0%   { opacity: 0;   background-position: 160% 0; }
      25%  { opacity: 1;   }
      100% { opacity: 0;   background-position: -60% 0; }
    }
    .stage-fill .label{ position:relative; z-index: 3; }

    /* final stage: strong bounce + glowing ring burst as the wave lands */
    @keyframes fillBounce{
      0%   { transform: scale(1);    }
      30%  { transform: scale(1.18); }
      55%  { transform: scale(0.95); }
      78%  { transform: scale(1.05); }
      100% { transform: scale(1);    }
    }
    .stage-fill-last{
      animation: fillBounce .55s cubic-bezier(0.34,1.7,0.5,1) !important;
      z-index: 4;
    }
    .stage-fill-last::before{
      content:"";
      position:absolute;
      inset:0;
      clip-path: inherit;
      box-shadow: 0 0 0 0 rgba(22,163,74,0.6);
      pointer-events:none;
      z-index: 1;
      animation: lastRing .6s ease-out forwards;
    }
    @keyframes lastRing{
      0%   { box-shadow: 0 0 0 0 rgba(22,163,74,0.6); }
      100% { box-shadow: 0 0 0 16px rgba(22,163,74,0); }
    }

    /* confetti burst at the final stage */
    .confetti-burst{
      position:absolute;
      width:0; height:0;
      pointer-events:none;
      z-index: 50;
    }
    .confetti-burst i{
      position:absolute;
      top:0; left:0;
      width:7px; height:7px;
      border-radius:1px;
      opacity:0;
      transform: translate(-50%,-50%);
      animation: confettiFly 1.2s cubic-bezier(0.2,0.6,0.3,1) forwards;
    }
    /* launch up + out, then fall with gravity, fading as it drops */
    @keyframes confettiFly{
      0%   { opacity:0;
             transform: translate(-50%,-50%) rotate(0deg) scale(0.5); }
      10%  { opacity:1; }
      40%  { opacity:1;
             transform: translate(calc(-50% + var(--dx)*0.6), calc(-50% + var(--cy1)))
                        rotate(calc(var(--cr)*0.5)) scale(1); }
      100% { opacity:0;
             transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--cy2)))
                        rotate(var(--cr)) scale(0.9); }
    }

    /* Celebration glow pulse behind the whole bar */
    #celebrateFlash{
      position:absolute;
      inset: -10px -6px;
      border-radius: 18px;
      pointer-events:none;
      z-index: 0;
      opacity: 0;
      background: radial-gradient(ellipse at center, rgba(34,197,94,0.35), rgba(34,197,94,0) 70%);
    }
    #celebrateFlash.go{
      animation: celebrateGlow .9s ease-out;
    }
    @keyframes celebrateGlow{
      0%   { opacity:0;   transform: scale(0.96); }
      30%  { opacity:1;   transform: scale(1.02); }
      100% { opacity:0;   transform: scale(1.05); }
    }

    /* Win toast — understated, matches existing toast style */

      position: fixed;
      top: -60px;

      z-index: 99999;

      transition: top 360ms cubic-bezier(0.22,1,0.36,1), opacity 240ms ease;

<body>

  <div class="toast" id="toast" role="status" aria-live="polite">

    <button class="x" id="toastClose" type="button" aria-label="Dismiss">
      <svg width="14" height="14" viewBox="0 0 24 24" aria-hidden="true">
        <path fill="#0d3a33" d="M18.3 5.7 12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7 2.9 18.3 9.2 12 2.9 5.7 4.3 4.3l6.3 6.3 6.3-6.3z"/>
      </svg>

  </div>

  <script>
    const MAKE_SET_STAGE_URL = "https://hook.us1.make.com/92gwsrg3sja4ykamx8qax9tdw6nqemq6";
    const MAKE_GET_STAGE_URL = "https://hook.us1.make.com/mnd1t2736lba22cphjm1qxfdffe1jemy";
    const MONDAY_STATUS_COLUMN_ID = "status__1";

    /* ===== FORWARD DEAL PATH (file-level, strictly progressive) =====
       Each stage represents how far the PROPERTY has advanced toward closing.
       Contact outcomes (Dial NA, Attempt 1/2/3, voicemails) are NOT stages —
       they live on subitems. A file stays in Discovery until a real
       decision-maker is reached, regardless of how many dials happen. */
    const STAGES = [
      { key: "new",            label: "New" },
      { key: "discovery",      label: "Discovery" },
      { key: "contact_made",   label: "Contact Made" },
      { key: "qualifying",     label: "Qualifying" },
      { key: "negotiation",    label: "Negotiation/Review" },
      { key: "under_contract", label: "Under Contract" },
      { key: "closed",         label: "Closed" }
    ];

    /* ===== OFF-RAMPS (terminal / parallel — NOT chevron stages) =====
       When a file exits active pursuit it lands on one of these. The chevron
       keeps showing how far it got, with an off-ramp badge layered on top. */
    const OFFRAMPS = [
      { key: "nurture", label: "Long-Term Nurture", tone: "warn" },
      { key: "lost",    label: "Lost",              tone: "alert" },
      { key: "dead",    label: "Dead",              tone: "muted" }
    ];

    /* Map existing Monday Lead Status labels → new stage keys / off-ramp keys.
       Lets the chevron read the current board correctly before/while you
       rename the status labels. Keys are normalized (lowercase, no punctuation). */
    const STAGE_ALIASES = {
      "untouched":                   "new",
      "initial dd":                  "discovery",
      "contacted discovery":         "discovery",
      "dial na":                     "discovery",
      "contacted":                   "contact_made",
      "contacted awaiting response": "contact_made",
      "interested in selling":       "qualifying",
      "interested unresponsive":     "qualifying",
      "negotiation review":          "negotiation",
      "negotiations review":         "negotiation",
      "accepted offer":              "negotiation",
      "under contract":              "under_contract",
      "sold":                        "closed",
      "auctioned off":               "closed"
    };
    const OFFRAMP_ALIASES = {
      "asking above retail":         "lost",
      "asking to much":              "lost",
      "asking too much":             "lost",
      "selling on market":           "lost",
      "not interested in selling":   "lost",
      "not worth pursuing":          "dead"
    };

    let activeOfframp = null; // holds an OFFRAMPS entry when file is off-path

    const STAGE_NOTES = {
      new: { title: "Open the file", bullets: [
        "Confirm the property address, county, and basic ownership picture.",
        "Pull initial data (deed, tax status, appraisal) to decide if it's worth pursuing.",
        "Set the first research task to move into Discovery."
      ]},
      discovery: { title: "Find & verify the people (all dialing lives here)", bullets: [
        "Identify and verify heirs / decision-makers; build the contact list on subitems.",
        "Skip-trace numbers and work the dials — Dial NA, Attempt 1/2/3 are tracked per-contact, not on the file.",
        "Stay in Discovery until a real decision-maker actually answers."
      ]},
      contact_made: { title: "You reached a decision-maker", bullets: [
        "Confirm this person can speak to the property and the decision.",
        "Capture relationship and ownership %, log the contact outcome on the subitem.",
        "Set the next conversation to begin qualifying."
      ]},
      qualifying: { title: "Gauge motivation & gather the facts", bullets: [
        "Why sell, and on what timeline? What problem are they solving?",
        "Confirm ownership structure, liens, taxes owed, and condition.",
        "Decide whether this is worth taking to an offer."
      ]},
      negotiation: { title: "Offer & terms", bullets: [
        "Present the offer; confirm payoff amounts and all parties required to sign.",
        "Work price/terms and align on verification + timing.",
        "Lock the exact terms before moving to contract."
      ]},
      under_contract: { title: "Get to the closing table", bullets: [
        "Confirm signed agreement and all signers verified.",
        "Track title/closing timeline, contingencies, and key dates.",
        "Keep all parties moving toward funding."
      ]},
      closed: { title: "Close-out checklist", bullets: [
        "Confirm signed docs received and parties verified.",
        "Confirm funding and final closing details.",
        "Capture lessons learned / notes for future deals."
      ]}
    };

    function getParam(name){
      return new URLSearchParams(window.location.search).get(name);
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    
    function isWebhookConfigured(url){
      if(!url) return false;
      const u = String(url);
      if(u.endsWith(".com/")) return false;
      if(u.includes("REPLACE_WITH_SECOND_WEBHOOK")) return false;
      return true;
    }

let activeIndex = 0;
    let isSavingRemoteStage = false;
    let closedComplete = false;

    const el = document.getElementById("dealPath");
    const completeBtn = document.getElementById("completeBtn");
    const notesToggle = document.getElementById("notesToggle");
    const panelWrap = document.getElementById("panelWrap");
    const panelBody = document.getElementById("panelBody");

    const toast = document.getElementById("toast");
    const toastMsg = document.getElementById("toastMsg");
    const toastClose = document.getElementById("toastClose");
    let toastTimer = null;

    function showToast(message){
      toastMsg.textContent = message || "Status changed successfully.";
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2500);
    }
    toastClose.addEventListener("click", () => toast.classList.remove("show"));

    function chkIcon(state){
      if(state !== "done"){
        return "";
      }
      return `
        <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#0d3a33" d="M9 16.2 4.8 12 3.4 13.4 9 19l12-12-1.4-1.4z"></path>
        </svg>
      `;
    }

    function renderGuidance(){
      const stage = STAGES[activeIndex];
      const note = STAGE_NOTES[stage.key] || { title: "Notes", bullets: [] };
      const bullets = (note.bullets || []).map(b => `<li>${escapeHtml(b)}</li>`).join("");
      panelBody.innerHTML = `
        <h4>${escapeHtml(note.title || "Notes")}</h4>
        ${bullets ? `<ul>${bullets}</ul>` : `<div style="color:#6a6a6a;font-weight:550;">No notes set for this stage.</div>`}
      `;
    }

    function render(){
      el.innerHTML = "";
      // Tooltip helper: show days in current stage when available
      const currentStageAgeDaysText = (() => {
        const t = (document.getElementById("mHeirsContactedText")?.textContent || document.getElementById("mHeirsContacted")?.textContent || "").trim();
        const m = t.match(/(\d+)/);
        if(m) {
          const d = parseInt(m[1], 10);
          if(Number.isFinite(d)) return d === 1 ? "1 day" : `${d} days`;
        }
        return "";
      })();
      STAGES.forEach((s, i) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "stage";
        btn.setAttribute("role", "tab");
        btn.setAttribute("aria-selected", String(i === activeIndex));
        btn.dataset.stage = s.key;

        const isLastStage = i === STAGES.length - 1;
        const state = (i < activeIndex) ? "done" : (i === activeIndex ? (closedComplete && isLastStage ? "done" : "active") : "todo");
        btn.dataset.state = state;

        const labelWrap = document.createElement("span");
        labelWrap.className = "label";

        const chk = document.createElement("span");
        chk.className = "chk";
        chk.innerHTML = chkIcon(state);
        labelWrap.appendChild(chk);

        const text = document.createElement("span");
        text.className = "text";
        text.textContent = s.label;
        labelWrap.appendChild(text);

        const tip = document.createElement("span");
        tip.className = "tip";
        tip.textContent = (state === "done") ? `Completed: ${s.label}` : (state === "active" ? (currentStageAgeDaysText ? `${currentStageAgeDaysText} in ${s.label}` : `Current: ${s.label}`) : `Upcoming: ${s.label}`);

        btn.appendChild(labelWrap);
        btn.appendChild(tip);

        btn.addEventListener("click", () => {
          if(i === activeIndex) return;
          // Brief press feedback, then a weighty 0.25s delay before committing
          btn.classList.remove("stage-pressed");
          void btn.offsetWidth;
          btn.classList.add("stage-pressed");
          setTimeout(() => setActive(i, { announce: true, saveRemote: true }), 500);
        });
        el.appendChild(btn);
      });

      // ===== Off-ramp overlay: file has exited active pursuit =====
      // Instead of a chevron stage, dim the path and lay a badge over the
      // last-reached stage so "how far it got" stays visible.
      el.classList.remove("path-offramp");
      if(activeOfframp){
        el.classList.add("path-offramp");
        const stages = el.querySelectorAll(".stage");
        const anchor = stages[Math.min(activeIndex, stages.length - 1)];
        if(anchor){
          const badge = document.createElement("span");
          badge.className = "offramp-badge offramp-" + activeOfframp.tone;
          badge.textContent = activeOfframp.label;
          anchor.appendChild(badge);
        }
      }

      renderGuidance();
    }

    function setActive(i, opts = {}){
      const prev = activeIndex;
      if(i === prev && !activeOfframp) return;
      activeIndex = i;
      activeOfframp = null; // moving onto a forward stage puts the file back in active pursuit

      const isClosing = i === STAGES.length - 1;
      // Reaching Closed IS completion — terminal and atomic, no second step.
      closedComplete = isClosing;
      render();
      updateCompleteBtn();

      if(isClosing && opts.announce){
        setTimeout(() => fireClosedCelebration(), 140);
      } else if(opts.announce){
        const label = STAGES[activeIndex].label || "Started";
        setTimeout(() => showToast(`Status changed successfully. (${label})`), 120);
      }
      if(opts.saveRemote){
        saveStageToMonday(prev).catch(()=>{});
      }
    }

    function normKey(s){
      return String(s || "").trim().toLowerCase()
        .replace(/[\/\-\.]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function stageIndexFromResponse(data){
      // Reset off-ramp each read; set below if the label is terminal.
      activeOfframp = null;

      // 1) Explicit stage key from backend
      if(data?.stageKey){
        const idx = STAGES.findIndex(s => s.key === data.stageKey);
        if(idx >= 0) return idx;
        const off = OFFRAMPS.find(o => o.key === data.stageKey);
        if(off){ activeOfframp = off; return offrampFallbackIndex(off); }
      }
      if(data?.leadStatus){
        const idx = STAGES.findIndex(s => s.key === data.leadStatus);
        if(idx >= 0) return idx;
      }

      // 2) Match by label (current Monday Lead Status text), via aliases
      const rawLabel = data?.stageLabel ?? data?.leadStatusLabel;
      if(rawLabel){
        const target = normKey(rawLabel);

        // direct match to a new stage label
        for(let i=0;i<STAGES.length;i++){
          if(normKey(STAGES[i].label) === target) return i;
        }
        // off-ramp by label
        for(const o of OFFRAMPS){
          if(normKey(o.label) === target){ activeOfframp = o; return offrampFallbackIndex(o); }
        }
        // alias → stage
        if(STAGE_ALIASES[target]){
          const idx = STAGES.findIndex(s => s.key === STAGE_ALIASES[target]);
          if(idx >= 0) return idx;
        }
        // alias → off-ramp
        if(OFFRAMP_ALIASES[target]){
          const off = OFFRAMPS.find(o => o.key === OFFRAMP_ALIASES[target]);
          if(off){ activeOfframp = off; return offrampFallbackIndex(off); }
        }
      }
      return -1;
    }

    /* When a file is on an off-ramp, the chevron still shows how far it got.
       Default to last known progress if backend sends one, else Discovery. */
    function offrampFallbackIndex(off){
      // 'dead' early-disqualified → show New/Discovery; others → keep wherever they were.
      return (off && off.key === "dead") ? 1 : Math.max(activeIndex, 1);
    }
    function cacheKey(itemId, boardId){
      return "dealpath_cache::" + (boardId ? String(boardId) : "") + "::" + String(itemId);
    }

    function readCache(itemId, boardId){
      try{
        const raw = localStorage.getItem(cacheKey(itemId, boardId));
        if(!raw) return null;
        const obj = JSON.parse(raw);
        if(!obj || typeof obj !== "object") return null;
        if(!obj.data || typeof obj.data !== "object") return null;
        return obj;
      }catch(e){
        return null;
      }
    }

    function writeCache(itemId, boardId, data){
      try{
        const payload = {
          cachedAt: new Date().toISOString(),
          data: {
            address: pickText(data?.address) || pickText(data?.title) || "",
            title: pickText(data?.title) || "",
            stageKey: data?.stageKey,
            stageLabel: data?.stageLabel,
            leadStatusLabel: data?.leadStatusLabel,
            stageAge: pickText(data?.stageAge) || "",
            stalledReason: pickText(data?.stalledReason) || "",
            followUpDate: pickText(data?.followUpDate) || "",
            nextActionStep: pickText(data?.nextActionStep) || "",
            lastStatusChangeDate: pickText(data?.lastStatusChangeDate) || pickText(data?.last_status_change_date) || ""
          }
        };
        localStorage.setItem(cacheKey(itemId, boardId), JSON.stringify(payload));
      }catch(e){}
    }

    
    function pickText(v){
      if(v === null || v === undefined) return "";
      if(typeof v === "string") return v;
      if(typeof v === "number" || typeof v === "boolean") return String(v);
      if(typeof v === "object"){
        // Common Make.com / Monday shapes
        if(typeof v.text === "string") return v.text;
        if(typeof v.value === "string") return v.value;
        if(typeof v.label === "string") return v.label;
      }
      return "";
    }

    function normalizeText(v){
      const s = pickText(v).trim();
      return s ? s : "—";
    }
    function setText(id, v){
      const el = document.getElementById(id);
      if(el) el.textContent = normalizeText(v);
    }


    function ordinalSuffix(n){
      const v = n % 100;
      if(v >= 11 && v <= 13) return "th";
      switch(n % 10){
        case 1: return "st";
        case 2: return "nd";
        case 3: return "rd";
        default: return "th";
      }
    }
    function formatDateNice(d){
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const m = months[d.getMonth()];
      const day = d.getDate();
      return `${m} ${day}${ordinalSuffix(day)}`;
    }
    function parseIsoDateOnly(text){
      const raw = pickText(text).trim();
      if(!raw) return null;
      // Accept YYYY-MM-DD or YYYY-MM-DD HH:MM...
      const m = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if(!m) return null;
      const iso = `${m[1]}-${m[2]}-${m[3]}`;
      const d = new Date(iso);
      if(isNaN(d.getTime())) return null;
      return { iso, date: d };
    }
    function computeStageAgeText(lastStatusChangeDate){
  const parsed = parseIsoDateOnly(lastStatusChangeDate);
  if(!parsed) return "";
  const now = new Date();
  const todayUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
  const thenUTC = Date.UTC(parsed.date.getFullYear(), parsed.date.getMonth(), parsed.date.getDate());
  const diffDays = Math.max(0, Math.floor((todayUTC - thenUTC) / 86400000));
  return diffDays === 1 ? "1 Day" : `${diffDays} Days`;
}

function setStageAgeColor(text){
  const wrap = document.getElementById("mHeirsContacted");
  const textEl = document.getElementById("mHeirsContactedText");
  if(!wrap) return;

  const raw = String(text || "").trim();
  const shown = (!raw || raw === "—") ? "—" : raw;

  if(textEl){
    textEl.textContent = shown;
  }else{
    wrap.textContent = shown;
  }
}



function setStageAgeFromData(data){
  const explicit = pickText(data?.stageAge).trim();
  if(explicit){
    setStageAgeColor(explicit);
    return;
  }
  const computed = computeStageAgeText(data?.lastStatusChangeDate || data?.last_status_change_date || "");
  setStageAgeColor(computed);
}


function setFollowUpDate(raw){
      const el = document.getElementById("mFollowUpDate");
      if(!el) return;

      const picked = pickText(raw).trim();
      if(!picked){
        el.textContent = "—";
        delete el.dataset.iso;
        return;
      }

      const isoParsed = parseIsoDateOnly(picked);
      if(isoParsed){
        el.dataset.iso = isoParsed.iso;
        el.textContent = formatDateNice(isoParsed.date);
        return;
      }

      // Fallback: try loose parse; keep original text if it looks human-formatted.
      const loose = parseLooseDate(picked);
      if(loose){
        // Store best-effort ISO if year/month/day are present
        const yyyy = loose.getFullYear();
        const mm = String(loose.getMonth()+1).padStart(2,"0");
        const dd = String(loose.getDate()).padStart(2,"0");
        el.dataset.iso = `${yyyy}-${mm}-${dd}`;
        el.textContent = formatDateNice(loose);
        return;
      }

      el.textContent = normalizeText(picked);
      delete el.dataset.iso;
    }

    let overlayShownAt = null;
    function showOverlay(on, titleText){
      const overlay = document.getElementById("loadingOverlay");
      const root = document.getElementById("root");
      const content = document.getElementById("contentWrap");
      const ttl = document.getElementById("loadingOverlayTitle");
      if(!overlay || !root) return;
      if(on){
        if(ttl && typeof titleText === "string") ttl.textContent = titleText;
        overlay.style.display = "flex";
        if(content) content.classList.add("loading-blur");
        overlayShownAt = Date.now();
      }else{
        overlay.style.display = "none";
        if(content) content.classList.remove("loading-blur");
        overlayShownAt = null;
      }
    }

    function setStalledReasonUI(){
      const wrap = document.getElementById("stallWrap");
      const empty = document.getElementById("stallEmpty");
      const valEl = document.getElementById("mStalledReason");
      const raw = valEl ? pickText(valEl.textContent) : "";
      const has = String(raw || "").trim() && String(raw).trim() !== "—";
      if(wrap) wrap.style.display = has ? "inline-flex" : "none";
      if(empty) empty.style.display = has ? "none" : "inline";
    }

function showLoading(on, text){
      const el = document.getElementById("hlLoading");
      const tx = document.getElementById("hlLoadingText");
      if(!el) return;
      if(on){
        if(tx && typeof text === "string") tx.textContent = text;
        el.style.display = "flex";
      }else{
        el.style.display = "none";
      }
    }

    function applyFieldsFromData(data){
      if(!data) return;

      // Lead Status / Stage
      const idx = stageIndexFromResponse(data);
      if(idx >= 0){
        activeIndex = idx;
        closedComplete = (idx === STAGES.length - 1);
        render();
        updateCompleteBtn();
      }

      // Title / Address (optional)
      {
        const addr = pickText(data?.address) || pickText(data?.title) || "";
        const t = document.getElementById("hlTitle");
        if(t) t.textContent = normalizeText(addr);
      }

      // Metrics (optional)
      setStageAgeFromData(data);
      setText("mStalledReason", data?.stalledReason);
      setStalledReasonUI();
      setFollowUpDate(data?.followUpDate);
      setText("mNextActionStep", data?.nextActionStep);

      // Recompute follow-up icon after any update
      setFollowUpIndicator();
    }


    async function loadStageFromMonday(){
      const itemId = getParam("itemId");
      const boardId = getParam("boardId") || getParam("board_id");
      if(!itemId) return;
      if(!isWebhookConfigured(MAKE_GET_STAGE_URL)) return;

      // ✅ Speed: paint immediately from local cache (if available), then refresh in background
      const cached = readCache(itemId, boardId);
      if(cached && cached.data){
        applyFieldsFromData(cached.data);
      }

      showLoading(true, cached ? "Syncing…" : "Loading…");
      showOverlay(true, "Loading record...");
      const overlayMinMs = 1500;
      const overlayStart = Date.now();

      try{
        const url = new URL(MAKE_GET_STAGE_URL);
        url.searchParams.set("itemId", String(itemId));
        if(boardId) url.searchParams.set("boardId", String(boardId));
        const userId = getParam("userId");
        if(userId) url.searchParams.set("userId", String(userId));

        const res = await fetch(url.toString(), {
          method: "GET",
          headers: { "Accept": "application/json" },
          cache: "no-store"
        });
        if(!res.ok) throw new Error("GET fields failed: " + res.status);

        const data = await res.json();

        applyFieldsFromData(data);
        writeCache(itemId, boardId, data);

      } catch (e){
        console.warn("Could not load remote fields:", e);
      } finally {
        // tiny delay prevents flicker if load is ultra fast
        // Prevent flicker + ensure at least ~1.5s overlay or until data arrives
        setTimeout(() => showLoading(false), 250);
        const elapsed = Date.now() - overlayStart;
        const remaining = Math.max(0, overlayMinMs - elapsed);
        setTimeout(() => showOverlay(false), remaining);
      }
    }

    async function saveStageToMonday(prevIndex){
      const itemId = getParam("itemId");
      if(!itemId) return;

      if(isSavingRemoteStage) return;
      if(!isWebhookConfigured(MAKE_SET_STAGE_URL)){
        showToast("Make SET webhook not configured yet.");
        return;
      }

      const payload = {
        itemId: String(itemId),
        columnId: MONDAY_STATUS_COLUMN_ID,
        stageKey: STAGES[activeIndex].key,
        stageLabel: STAGES[activeIndex].label,
        previousStageKey: STAGES[prevIndex]?.key || null,
        previousStageLabel: STAGES[prevIndex]?.label || null,
        occurredAt: new Date().toISOString(),
        boardId: getParam("boardId") || getParam("board_id"),
        userId: getParam("userId")
      };

      isSavingRemoteStage = true;
      try{
        await fetch(MAKE_SET_STAGE_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          keepalive: true
        });
      } catch (e){
        console.warn("Save to Monday failed:", e);
        showToast("Could not save stage. Please retry.");
      } finally {
        isSavingRemoteStage = false;
      }
    }

    notesToggle.addEventListener("click", () => {
      const expanded = notesToggle.getAttribute("aria-expanded") === "true";
      const next = !expanded;
      notesToggle.setAttribute("aria-expanded", String(next));
      panelWrap.classList.toggle("collapsed", !next);
    });

    function updateCompleteBtn(){
      if(!completeBtn) return;
      const onClosed = (activeIndex === STAGES.length - 1) && closedComplete;
      if(onClosed){
        completeBtn.disabled = true;
        completeBtn.classList.add("cta-done");
        completeBtn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="white" d="M9 16.2 4.8 12 3.4 13.4 9 19l12-12-1.4-1.4z"/>
          </svg>
          Deal Closed`;
      } else {
        completeBtn.disabled = false;
        completeBtn.classList.remove("cta-done");
        completeBtn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="white" d="M9 16.2 4.8 12 3.4 13.4 9 19l12-12-1.4-1.4z"/>
          </svg>
          Mark Stage as Complete`;
      }
    }

    completeBtn.addEventListener("click", () => {
      if(completeBtn.disabled) return;
      // Advancing always moves forward one stage. Landing on Closed completes
      // the deal in a single step (setActive fires the one celebration).
      if(activeIndex < STAGES.length - 1){
        setTimeout(() => setActive(activeIndex + 1, { announce: true, saveRemote: true }), 80);
      }
    });
    updateCompleteBtn();

    /* Follow-up indicator icons */
    const followUpEl = document.getElementById("mFollowUpDate");
    const followUpIcon = document.getElementById("followUpIcon");
    const followUpBadge = document.getElementById("followUpBadge");

    function parseLooseDate(text){
      if(!text) return null;
      const raw = String(text).trim();
      const cleaned = raw.replace(/\b(\d{1,2})(st|nd|rd|th)\b/gi, "$1");
      const hasYear = /\b(19|20)\d{2}\b/.test(cleaned);
      const withYear = hasYear ? cleaned : (cleaned + " " + new Date().getFullYear());
      const d = new Date(withYear);
      if(isNaN(d.getTime())) return null;
      return d;
    }

    
    function setFollowUpIndicator(){
      if(!followUpEl) return;

      const badge = followUpBadge;
      const rawText = String(followUpEl.textContent || "").trim();
      const isoAttr = (followUpEl.dataset && followUpEl.dataset.iso) ? String(followUpEl.dataset.iso).trim() : "";
      if(followUpIcon) followUpIcon.innerHTML = ""; // keep element but unused visually
      if(badge){
        badge.style.display = "none";
        badge.className = "";
        badge.textContent = "";
      }

      // If empty/placeholder, no badge
      if(!rawText || rawText === "—") return;

      const d = isoAttr ? new Date(isoAttr) : parseLooseDate(rawText);
      if(!d) return;
      if(isNaN(d.getTime())) return;

      const today = new Date();
      today.setHours(0,0,0,0);
      const dd = new Date(d);
      dd.setHours(0,0,0,0);

      const isOverdue = dd < today;
      if(badge){
        badge.style.display = "inline-flex";
        badge.className = "badge " + (isOverdue ? "overdue" : "upcoming");
        badge.textContent = isOverdue ? "overdue" : "upcoming";
      }
    }

    setFollowUpIndicator();

    if(followUpEl){
      const obs = new MutationObserver(() => setFollowUpIndicator());
      obs.observe(followUpEl, { childList: true, characterData: true, subtree: true });
    }


    /* ===== CLOSED CELEBRATION ===== */
    function spawnConfetti(anchorEl, opts){
      opts = opts || {};
      const host = (anchorEl && anchorEl.closest(".bar")) || document.querySelector(".bar");
      if(!host) return;
      if(getComputedStyle(host).position === "static") host.style.position = "relative";

      const hostRect = host.getBoundingClientRect();
      // Launch across the full width of the bar for a fuller burst, biased to a center
      const originX = opts.originX != null ? opts.originX : hostRect.width * 0.5;
      const originY = opts.originY != null ? opts.originY : hostRect.height * 0.5;
      const spreadX = opts.spreadX != null ? opts.spreadX : hostRect.width * 0.5;

      const burst = document.createElement("span");
      burst.className = "confetti-burst";
      burst.style.left = "0px";
      burst.style.top  = "0px";

      const colors = ["#1447c0","#16a34a","#f59e0b","#ec4899","#06b6d4","#ffffff","#22c55e","#a855f7"];
      const pieces = opts.pieces || 46;
      for(let k=0;k<pieces;k++){
        const i = document.createElement("i");
        // start somewhere along the bar width
        const startX = originX + (Math.random()*2 - 1) * spreadX;
        const startY = originY + (Math.random()*2 - 1) * 8;
        // launch up and outward, then fall (gravity handled in keyframe via --cy2)
        const dx = (Math.random()*2 - 1) * 120;
        const upY = -(40 + Math.random()*70);
        const fallY = 60 + Math.random()*90;
        i.style.left = startX.toFixed(1) + "px";
        i.style.top  = startY.toFixed(1) + "px";
        i.style.setProperty("--dx",  dx.toFixed(1) + "px");
        i.style.setProperty("--cy1", upY.toFixed(1) + "px");
        i.style.setProperty("--cy2", fallY.toFixed(1) + "px");
        i.style.setProperty("--cr",  (Math.random()*900 - 450).toFixed(0) + "deg");
        i.style.background = colors[k % colors.length];
        // mix in a few rectangles vs squares for variety
        if(k % 3 === 0){ i.style.width = "5px"; i.style.height = "10px"; }
        i.style.animationDelay = (Math.random()*120) + "ms";
        i.style.animationDuration = (1100 + Math.random()*500) + "ms";
        burst.appendChild(i);
      }
      host.appendChild(burst);
      setTimeout(() => burst.remove(), 1900);
    }

    function fireClosedCelebration(){
      const stages = document.querySelectorAll(".stage");
      const last = stages[stages.length - 1];
      const n = stages.length;
      const bar = document.querySelector(".bar");
      const barRect = bar ? bar.getBoundingClientRect() : null;

      // Bold pop pours across each stage in turn, left → right.
      const step = 95;
      stages.forEach((st, idx) => {
        st.classList.remove("stage-fill");
        void st.offsetWidth;
        st.style.setProperty("--fill-delay", (idx * step) + "ms");
        st.classList.add("stage-fill");
      });

      const finalDelay = (n - 1) * step + 300;
      setTimeout(() => {
        if(last){
          last.classList.remove("stage-fill-last");
          void last.offsetWidth;
          last.classList.add("stage-fill-last");
          last.classList.remove("stage-closed-flash");
          void last.offsetWidth;
          last.classList.add("stage-closed-flash");
        }
        // Big celebration: two confetti waves — one wide across the bar,
        // one concentrated over the final stage — plus a screen flash.
        spawnConfetti(last, { pieces: 54 });
        if(barRect && last){
          const lastRect = last.getBoundingClientRect();
          const cx = (lastRect.left + lastRect.width/2) - barRect.left;
          setTimeout(() => spawnConfetti(last, { pieces: 30, originX: cx, spreadX: 40 }), 180);
        }
        fireScreenFlash();
      }, finalDelay);

      setTimeout(showWinToast, finalDelay);
    }

    /* Soft full-bar glow pulse behind the celebration */
    function fireScreenFlash(){
      const bar = document.querySelector(".bar");
      if(!bar) return;
      let fx = document.getElementById("celebrateFlash");
      if(!fx){
        fx = document.createElement("div");
        fx.id = "celebrateFlash";
        bar.appendChild(fx);
      }
      fx.classList.remove("go");
      void fx.offsetWidth;
      fx.classList.add("go");
      setTimeout(() => { fx.classList.remove("go"); }, 900);
    }

    let winToastTimer = null;
    function showWinToast(){
      const t = document.getElementById("winToast");
      if(!t) return;
      t.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M9 12.5L11.5 15L15.5 10" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="12" r="9" stroke="#16a34a" stroke-width="1.5" opacity="0.5"/>
        </svg>
        <div class="win-title">🎉 Deal closed — congratulations!</div>`;
      t.classList.remove("hide");
      t.classList.add("show");
      clearTimeout(winToastTimer);
      winToastTimer = setTimeout(() => { t.classList.remove("show"); t.classList.add("hide"); }, 3200);
    }

    render();
    // Ensure placeholders show dashes immediately if empty
    ["mStalledReason","mFollowUpDate","mNextActionStep"].forEach(id => {
      const el = document.getElementById(id);
      if(el) setText(id, el.textContent);
    });
    setStalledReasonUI();
    loadStageFromMonday();
  </script>
</body>
</html>
